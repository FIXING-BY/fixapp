<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fix App | Premium Market</title>
    <style>
        :root { --bg: #121212; --card-bg: #1e1e1e; --accent: #00f2ff; --text-main: #e0e0e0; --text-dim: #909090; }
        body { background-color: var(--bg); color: var(--text-main); font-family: 'Inter', sans-serif; margin: 0; padding: 40px 15px; display: flex; flex-direction: column; align-items: center; }
        header { text-align: center; width: 100%; max-width: 600px; margin-bottom: 40px; }
        h1 { font-size: 3.5rem; margin: 0 0 20px 0; background: linear-gradient(135deg, #00f2ff, #0072ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
        .controls { display: flex; flex-direction: column; gap: 20px; width: 100%; }
        #searchInput { width: 100%; padding: 16px 25px; background: var(--card-bg); border: 1px solid #333; border-radius: 20px; color: white; font-size: 1rem; outline: none; box-sizing: border-box; }
        .filters { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
        .filter-btn { background: #252525; border: 1px solid #444; color: white; padding: 8px 15px; border-radius: 12px; cursor: pointer; transition: 0.3s; font-size: 0.8rem; }
        .filter-btn.active { background: var(--accent); color: black; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; width: 100%; max-width: 1100px; }
        .card { background: var(--card-bg); border-radius: 35px; padding: 25px; text-align: center; cursor: pointer; transition: 0.4s; border: 1px solid #2a2a2a; position: relative; overflow: hidden; }
        .card:hover { transform: translateY(-8px); border-color: transparent; }
        .card::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: conic-gradient(from 0deg, #ff0000, #00f2ff, #00ff00, #ffff00, #ff0000); animation: rotateRGB 3s linear infinite; opacity: 0; transition: 0.3s; z-index: 0; }
        .card:hover::before { opacity: 1; }
        .card::after { content: ''; position: absolute; inset: 3px; background: var(--card-bg); border-radius: 32px; z-index: 1; }
        @keyframes rotateRGB { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .card-content { position: relative; z-index: 2; }
        .card img { width: 90px; height: 90px; border-radius: 22px; margin-bottom: 12px; object-fit: cover; }
        .dev-name { color: var(--accent); font-size: 0.75rem; font-weight: bold; margin-bottom: 5px; }
        .verified-badge { position: absolute; top: 15px; right: 15px; background: var(--accent); color: black; font-size: 0.6rem; padding: 4px 8px; border-radius: 10px; font-weight: 900; z-index: 5; }
        .plat-tags { display: flex; justify-content: center; gap: 4px; flex-wrap: wrap; margin-bottom: 8px; }
        .plat-tag { background: #333; color: var(--accent); font-size: 0.55rem; padding: 2px 6px; border-radius: 5px; border: 1px solid rgba(0, 242, 255, 0.2); font-weight: bold; text-transform: uppercase; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal { background: var(--card-bg); width: 90%; max-width: 420px; padding: 40px; border-radius: 40px; text-align: center; border: 1px solid #333; position: relative; }
        .modal img { width: 110px; height: 110px; border-radius: 25px; margin-bottom: 20px; }
        .download-btn { display: block; background: var(--accent); color: #000; text-decoration: none; padding: 18px; border-radius: 20px; font-weight: 800; margin-top: 25px; transition: 0.3s; }
        .close-btn { position: absolute; top: 20px; right: 25px; font-size: 30px; cursor: pointer; color: #555; }
    </style>
</head>
<body>

    <header>
        <h1>Fix App</h1>
        <div class="controls">
            <input type="text" id="searchInput" placeholder="Ara..." onkeyup="filterAll()">
            <div class="filters">
                <button class="filter-btn active" onclick="setFilter('all', this)">Hepsi</button>
                <button class="filter-btn" onclick="setFilter('windows', this)">Win</button>
                <button class="filter-btn" onclick="setFilter('android', this)">Android</button>
                <button class="filter-btn" onclick="setFilter('ios', this)">iOS</button>
                <button class="filter-btn" onclick="setFilter('web', this)">Web</button>
                <button class="filter-btn" onclick="setFilter('lynx', this)">Lynx</button>
            </div>
        </div>
    </header>

    <div class="grid" id="appGrid"></div>

    <div class="overlay" id="overlay" onclick="closeApp()">
        <div class="modal" onclick="event.stopPropagation()">
            <span class="close-btn" onclick="closeApp()">&times;</span>
            <img id="m-img" src="">
            <h2 id="m-title" style="margin: 0;"></h2>
            <div id="m-dev" style="color: var(--accent); font-weight: bold; font-size: 0.85rem; margin-top: 5px;"></div>
            <p id="m-desc" style="color: var(--text-dim); line-height: 1.6; margin-top: 15px;"></p>
            <a href="#" id="m-link" target="_blank" class="download-btn">İNDİR / GİT</a>
        </div>
    </div>

    <script>
        let allApps = []; 
        let currentFilter = 'all';

        async function fetchApps() {
            allApps = []; 
            const timestamp = Date.now();
            
            // Sıralı yükleme (Aynı diziye ekleme yapacak)
            await loadFile('uygulamalar.txt?t=' + timestamp, true);
            await loadFile('https://raw.githubusercontent.com/hasaneymenkartalprollc8-gif/apps/main/online.app.s?t=' + timestamp, false);
            
            filterAll();
        }

        async function loadFile(url, isOri) {
            try {
                const res = await fetch(url, { cache: "no-store" });
                if (res.ok) {
                    const text = await res.text();
                    // Satırları temizle ve boşlukları atla
                    const lines = text.split(/\r?\n/).filter(line => line.trim() !== "");
                    
                    lines.forEach(line => {
                        const p = line.split(',').map(item => item.trim());
                        
                        // En az Ad ve Link/Logo bilgisi varsa ekle, "s" hatalarını atla
                        if (p.length >= 3 && p[0].toLowerCase() !== 's' && p[0] !== '') {
                            allApps.push({
                                ad: p[0],
                                dev: p[1] || 'Fixing User',
                                desc: p[2] || '',
                                plat: p[3] ? p[3].toLowerCase().split(' ') : [],
                                logo: p[p.length - 2] || '', // Sondan bir önceki genelde logodur
                                link: p[p.length - 1] || '#', // En sondaki linktir
                                isOriginal: isOri
                            });
                        }
                    });
                }
            } catch (e) { console.error("Yükleme hatası:", url); }
        }

        function setFilter(type, btn) {
            currentFilter = type;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            filterAll();
        }

        function filterAll() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const grid = document.getElementById('appGrid');
            grid.innerHTML = "";

            // En son eklenen en üstte (Kopyasını alıp ters çevir)
            const list = [...allApps].reverse();

            list.forEach(app => {
                const matchesSearch = app.ad.toLowerCase().includes(term) || app.dev.toLowerCase().includes(term);
                const matchesFilter = currentFilter === 'all' || app.plat.includes(currentFilter);

                if (matchesSearch && matchesFilter) {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.onclick = () => openApp(app);
                    
                    const badge = app.isOriginal ? `<div class="verified-badge">ORİJİNAL</div>` : '';
                    const platHtml = app.plat.map(pt => `<span class="plat-tag">${pt}</span>`).join('');

                    card.innerHTML = `
                        ${badge}
                        <div class="card-content">
                            <img src="${app.logo}" onerror="this.src='https://via.placeholder.com/90/252525/00f2ff?text=FIX'">
                            <div class="dev-name">${app.dev.toUpperCase()}</div>
                            <h3 style="margin: 5px 0;">${app.ad}</h3>
                            <div class="plat-tags">${platHtml}</div>
                        </div>
                    `;
                    grid.appendChild(card);
                }
            });
        }

        function openApp(app) {
            document.getElementById('m-img').src = app.logo;
            document.getElementById('m-title').textContent = app.ad;
            document.getElementById('m-dev').textContent = "GELİŞTİRİCİ: " + app.dev.toUpperCase();
            document.getElementById('m-desc').textContent = app.desc;
            document.getElementById('m-link').href = app.link;
            document.getElementById('overlay').style.display = 'flex';
        }

        function closeApp() { document.getElementById('overlay').style.display = 'none'; }

        fetchApps();
    </script>
</body>
</html>
