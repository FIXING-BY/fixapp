<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fix App | Premium</title>
    <style>
        :root {
            --bg: #121212;
            --card-bg: #1e1e1e;
            --accent: #00f2ff;
            --text-main: #e0e0e0;
            --text-dim: #909090;
            --verified: #00f2ff;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 40px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header { text-align: center; width: 100%; max-width: 600px; margin-bottom: 40px; }
        h1 {
            font-size: 3.5rem; margin: 0 0 20px 0;
            background: linear-gradient(135deg, #00f2ff, #0072ff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        .controls { display: flex; flex-direction: column; gap: 20px; width: 100%; }
        #searchInput {
            width: 100%; padding: 16px 25px; background: var(--card-bg);
            border: 1px solid #333; border-radius: 20px; color: white;
            font-size: 1rem; outline: none; box-sizing: border-box;
        }

        .filters { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .filter-btn {
            background: #252525; border: 1px solid #444; color: white;
            padding: 10px 18px; border-radius: 15px; cursor: pointer; transition: 0.3s;
        }
        .filter-btn.active { background: var(--accent); color: black; font-weight: bold; }

        .grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px; width: 100%; max-width: 1100px;
        }

        .card {
            background: var(--card-bg); border-radius: 35px;
            padding: 25px; text-align: center; cursor: pointer;
            transition: 0.4s; border: 1px solid #2a2a2a;
            position: relative; overflow: hidden;
        }

        .card:hover { transform: translateY(-8px); border-color: transparent; }
        .card::before {
            content: ''; position: absolute; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: conic-gradient(from 0deg, #ff0000, #00f2ff, #00ff00, #ffff00, #ff0000);
            animation: rotateRGB 3s linear infinite; opacity: 0; transition: 0.3s; z-index: 0;
        }
        .card:hover::before { opacity: 1; }
        .card::after {
            content: ''; position: absolute; inset: 3px;
            background: var(--card-bg); border-radius: 32px; z-index: 1;
        }
        @keyframes rotateRGB { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .card-content { position: relative; z-index: 2; }
        .card img { width: 90px; height: 90px; border-radius: 22px; margin-bottom: 12px; object-fit: cover; }
        
        .dev-name { 
            color: var(--accent); 
            font-size: 0.75rem; 
            font-weight: bold; 
            margin-bottom: 5px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 4px;
        }

        /* Orijinal Etiketi */
        .verified-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--accent);
            color: black;
            font-size: 0.6rem;
            padding: 4px 8px;
            border-radius: 10px;
            font-weight: 900;
            z-index: 5;
            letter-spacing: 0.5px;
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(12px);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal {
            background: var(--card-bg); width: 90%; max-width: 420px; padding: 40px;
            border-radius: 40px; text-align: center; border: 1px solid #333; position: relative;
        }
        .modal img { width: 110px; height: 110px; border-radius: 25px; margin-bottom: 20px; }

        .download-btn {
            display: block; background: var(--accent); color: #000;
            text-decoration: none; padding: 18px; border-radius: 20px;
            font-weight: 800; margin-top: 25px; transition: 0.3s;
        }
        .download-btn:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(0, 242, 255, 0.6); }

        .close-btn { position: absolute; top: 20px; right: 25px; font-size: 30px; cursor: pointer; color: #555; }
    </style>
</head>
<body>

    <header>
        <h1>Fix App</h1>
        <div class="controls">
            <input type="text" id="searchInput" placeholder="Ara..." onkeyup="filterAll()">
            <div class="filters">
                <button class="filter-btn active" onclick="setFilter('all', this)">Hepsi</button>
                <button class="filter-btn" onclick="setFilter('windows', this)">Windows</button>
                <button class="filter-btn" onclick="setFilter('android', this)">Android</button>
                <button class="filter-btn" onclick="setFilter('iphone', this)">iPhone</button>
                <button class="filter-btn" onclick="setFilter('web', this)">Web</button>
            </div>
        </div>
    </header>

    <div class="grid" id="appGrid"></div>

    <div class="overlay" id="overlay" onclick="closeApp()">
        <div class="modal" onclick="event.stopPropagation()">
            <span class="close-btn" onclick="closeApp()">&times;</span>
            <img id="m-img" src="">
            <div id="m-ver-text" style="color: var(--accent); font-size: 0.7rem; font-weight: 900; margin-bottom: 5px; display: none;">FIXING ORİJİNAL</div>
            <h2 id="m-title" style="margin: 0;"></h2>
            <div id="m-dev" style="color: var(--accent); font-weight: bold; font-size: 0.85rem; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 4px;"></div>
            <div id="m-platforms" style="display:flex; justify-content:center; gap:5px; margin-bottom:20px;"></div>
            <p id="m-desc" style="color: var(--text-dim); line-height: 1.6;"></p>
            <a href="#" id="m-link" class="download-btn">İNDİR</a>
        </div>
    </div>

    <script>
        let apps = [];
        let currentFilter = 'all';

        async function fetchApps() {
            // Kaynakları çekiyoruz
            const localSource = 'uygulamalar.txt';
            const remoteSource = 'https://raw.githubusercontent.com/hasaneymenkartalprollc8-gif/apps/main/online.app.s';

            // 1. Yerel (Orijinal) Kaynağı Çek
            try {
                const resLocal = await fetch(localSource);
                if (resLocal.ok) parseData(await resLocal.text(), true);
            } catch (e) { console.log("Yerel dosya yok."); }

            // 2. GitHub (Dış) Kaynağı Çek
            try {
                const resRemote = await fetch(remoteSource);
                if (resRemote.ok) parseData(await resRemote.text(), false);
            } catch (e) { console.log("Dış kaynak yok."); }

            filterAll();
        }

        function parseData(text, isOriginal) {
            const lines = text.split('\n');
            lines.forEach(line => {
                if (line.trim() === "" || !line.includes(',')) return;
                const [ad, dev, desc, platforms, logo, link] = line.split(',');
                apps.push({
                    ad: ad.trim(),
                    gelistirici: dev.trim(),
                    aciklama: desc.trim(),
                    platforms: platforms.trim().split(' '),
                    logo: logo.trim(),
                    link: link.trim(),
                    isOriginal: isOriginal // Orijinal mi etiketi
                });
            });
        }

        function setFilter(type, btn) {
            currentFilter = type;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            filterAll();
        }

        function filterAll() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const grid = document.getElementById('appGrid');
            grid.innerHTML = "";

            apps.forEach((app, index) => {
                const matchesSearch = app.ad.toLowerCase().includes(term) || app.gelistirici.toLowerCase().includes(term);
                const matchesFilter = currentFilter === 'all' || app.platforms.includes(currentFilter);

                if (matchesSearch && matchesFilter) {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.onclick = () => openApp(index);
                    
                    const oriBadge = app.isOriginal ? `<div class="verified-badge">ORİJİNAL</div>` : '';
                    const oriIcon = app.isOriginal ? ' ✓' : '';

                    card.innerHTML = `
                        ${oriBadge}
                        <div class="card-content">
                            <img src="${app.logo}" onerror="this.src='https://via.placeholder.com/90/252525/00f2ff?text=FIX'">
                            <div class="dev-name">${app.gelistirici.toUpperCase()}${oriIcon}</div>
                            <h3>${app.ad}</h3>
                        </div>
                    `;
                    grid.appendChild(card);
                }
            });
        }

        function openApp(index) {
            const app = apps[index];
            document.getElementById('m-img').src = app.logo;
            document.getElementById('m-title').textContent = app.ad;
            document.getElementById('m-dev').textContent = "GELİŞTİRİCİ: " + app.gelistirici.toUpperCase() + (app.isOriginal ? ' ✓' : '');
            document.getElementById('m-desc').textContent = app.aciklama;
            document.getElementById('m-link').href = app.link;
            document.getElementById('m-ver-text').style.display = app.isOriginal ? 'block' : 'none';
            
            document.getElementById('m-platforms').innerHTML = app.platforms.map(p => 
                `<span style="background:#333; color:var(--accent); padding:4px 10px; border-radius:10px; font-size:0.7rem; border:1px solid var(--accent);">${p.toUpperCase()}</span>`
            ).join('');
            document.getElementById('overlay').style.display = 'flex';
        }

        function closeApp() { document.getElementById('overlay').style.display = 'none'; }

        fetchApps();
    </script>
</body>
</html>
