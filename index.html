<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fix App | Universal Market</title>
    <style>
        :root { --bg: #0b0b0b; --card: #151515; --accent: #00f2ff; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        header { text-align: center; margin-bottom: 30px; }
        h1 { font-size: 3rem; margin: 0; background: linear-gradient(90deg, #00f2ff, #0072ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
        .search-box { width: 100%; max-width: 500px; margin-bottom: 20px; }
        #searchInput { width: 100%; padding: 15px; border-radius: 15px; border: 1px solid #333; background: #1a1a1a; color: white; outline: none; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; width: 100%; max-width: 1000px; }
        .card { background: var(--card); border-radius: 25px; padding: 20px; text-align: center; cursor: pointer; transition: 0.3s; border: 1px solid #222; position: relative; overflow: hidden; }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); }
        .card img { width: 80px; height: 80px; border-radius: 18px; margin-bottom: 10px; object-fit: cover; background: #222; }
        .card h3 { margin: 10px 0 5px; font-size: 1.1rem; }
        .card p { color: var(--accent); font-size: 0.7rem; font-weight: bold; margin: 0; text-transform: uppercase; }
        .badge { position: absolute; top: 10px; right: 10px; font-size: 0.6rem; padding: 4px 8px; border-radius: 8px; font-weight: 900; }
        .badge-main { background: var(--accent); color: #000; }
        .badge-online { background: #ff00ea; color: #fff; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: none; justify-content: center; align-items: center; z-index: 9999; }
        .modal { background: #1a1a1a; width: 90%; max-width: 400px; padding: 30px; border-radius: 30px; text-align: center; border: 1px solid #333; position: relative; }
        .download-btn { display: block; background: var(--accent); color: #000; padding: 15px; border-radius: 12px; text-decoration: none; font-weight: 800; margin-top: 10px; transition: 0.2s; }
        .close-btn { position: absolute; top: 15px; right: 20px; color: #555; cursor: pointer; font-size: 1.5rem; }
    </style>
</head>
<body>

    <header>
        <h1>Fix App</h1>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Uygulama ara..." onkeyup="renderApps()">
        </div>
    </header>

    <div class="grid" id="appGrid">
        <p id="loadingText">Sistemler taranıyor...</p>
    </div>

    <div class="overlay" id="overlay" onclick="closeApp()">
        <div class="modal" onclick="event.stopPropagation()">
            <span class="close-btn" onclick="closeApp()">&times;</span>
            <img id="m-img" src="">
            <h2 id="m-title" style="margin:0;"></h2>
            <div id="m-dev" style="color:var(--accent); font-size:0.8rem; margin-top:5px;"></div>
            <p id="m-desc" style="color:#888; font-size:0.9rem; line-height:1.4; margin:15px 0;"></p>
            <div id="link-container"></div>
        </div>
    </div>

    <script>
        // İKİ FARKLI KAYNAK
        const SOURCES = [
            { name: "ANA", url: "https://raw.githubusercontent.com/FIXING-BY/fixapp/main/uygulamalar.txt", badge: "badge-main" },
            { name: "CREATOR", url: "https://raw.githubusercontent.com/hasaneymenkartalprollc8-gif/apps/main/online.app.s", badge: "badge-online" }
        ];

        let allApps = [];

        async function init() {
            allApps = [];
            for (const src of SOURCES) {
                try {
                    const res = await fetch(src.url + "?t=" + Date.now());
                    if (res.ok) {
                        const text = await res.text();
                        const lines = text.split('\n').filter(l => l.trim() !== "" && !l.startsWith('s,'));
                        lines.forEach(line => {
                            const [ad, dev, desc, plats, logo, links] = line.split(',').map(s => s.trim());
                            allApps.push({ ad, dev, desc, plats: plats.split(' '), logo, links: links ? links.split(' ') : [], type: src.name, badgeClass: src.badge });
                        });
                    }
                } catch (e) { console.error(src.name + " verisi çekilemedi."); }
            }
            renderApps();
            checkUrlForApp(); // Sayfa yüklendiğinde URL'yi kontrol et
        }

        function renderApps() {
            const grid = document.getElementById('appGrid');
            const search = document.getElementById('searchInput').value.toLowerCase();
            grid.innerHTML = "";

            const filtered = allApps.filter(a => a.ad.toLowerCase().includes(search)).reverse();

            if (filtered.length === 0) {
                grid.innerHTML = "<p>Uygulama bulunamadı.</p>";
                return;
            }

            filtered.forEach(app => {
                const card = document.createElement('div');
                card.className = "card";
                card.onclick = () => openApp(app);
                card.innerHTML = `
                    <div class="badge ${app.badgeClass}">${app.type}</div>
                    <img src="${app.logo}" onerror="this.src='https://via.placeholder.com/80/222/00f2ff?text=FIX'">
                    <p>${app.dev}</p>
                    <h3>${app.ad}</h3>
                `;
                grid.appendChild(card);
            });
        }

        function openApp(app) {
            // URL'yi değiştir (Örn: ?app=FixingSearch)
            const url = new URL(window.location);
            url.searchParams.set('app', app.ad);
            window.history.pushState({}, '', url);

            document.getElementById('m-img').src = app.logo;
            document.getElementById('m-title').textContent = app.ad;
            document.getElementById('m-dev').textContent = "Geliştirici: " + app.dev;
            document.getElementById('m-desc').textContent = app.desc;
            const cont = document.getElementById('link-container');
            cont.innerHTML = "";

            app.links.forEach(link => {
                const btn = document.createElement('a');
                btn.className = "download-btn";
                const match = link.match(/\[(.*?)\](.*)/);
                let label = "İNDİR", urlLink = link;
                if (match) { label = match[1].toUpperCase(); urlLink = match[2]; }

                if (!urlLink.startsWith('http')) {
                    const base = app.type === "ANA" ? "FIXING-BY/fixapp" : "hasaneymenkartalprollc8-gif/apps";
                    btn.href = `https://raw.githubusercontent.com/${base}/main/${urlLink}`;
                    btn.setAttribute('download', '');
                    btn.textContent = label + " DOSYASINI İNDİR";
                } else {
                    btn.href = urlLink; btn.target = "_blank"; btn.textContent = label + " GİT";
                }
                cont.appendChild(btn);
            });
            document.getElementById('overlay').style.display = 'flex';
        }

        function closeApp() { 
            document.getElementById('overlay').style.display = 'none'; 
            // Kapatınca URL'yi temizle (Normal site linkine dön)
            const url = new URL(window.location);
            url.searchParams.delete('app');
            window.history.pushState({}, '', url);
        }

        // URL'de "?app=UygulamaAdı" varsa otomatik açan fonksiyon
        function checkUrlForApp() {
            const params = new URLSearchParams(window.location.search);
            const targetApp = params.get('app');
            
            if (targetApp) {
                // Adı eşleşen uygulamayı bul
                const appToOpen = allApps.find(a => a.ad === targetApp);
                if (appToOpen) {
                    openApp(appToOpen);
                }
            }
        }

        init();
    </script>
</body>
</html>
