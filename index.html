<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fix App | Premium Market</title>
    <style>
        :root { 
            --bg: #121212; --card-bg: #1e1e1e; --accent: #00f2ff; 
            --text-main: #e0e0e0; --text-dim: #909090;
        }

        body { 
            background-color: var(--bg); color: var(--text-main); 
            font-family: 'Inter', sans-serif; margin: 0; padding: 40px 15px; 
            display: flex; flex-direction: column; align-items: center; 
        }

        header { text-align: center; width: 100%; max-width: 600px; margin-bottom: 40px; }
        h1 { 
            font-size: 3.5rem; margin: 0; 
            background: linear-gradient(135deg, #00f2ff, #0072ff); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            font-weight: 900; 
        }

        .controls { display: flex; flex-direction: column; gap: 20px; width: 100%; margin-top: 20px; }
        #searchInput { 
            width: 100%; padding: 16px 25px; background: var(--card-bg); 
            border: 1px solid #333; border-radius: 20px; color: white; 
            font-size: 1rem; outline: none; box-sizing: border-box; 
        }

        .filters { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
        .filter-btn { 
            background: #252525; border: 1px solid #444; color: white; 
            padding: 8px 15px; border-radius: 12px; cursor: pointer; transition: 0.3s; font-size: 0.8rem; 
        }
        .filter-btn.active { background: var(--accent); color: black; font-weight: bold; }

        .grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
            gap: 25px; width: 100%; max-width: 1100px; margin-top: 30px;
        }

        /* RGB KARTLAR */
        .card { 
            background: var(--card-bg); border-radius: 35px; padding: 25px; 
            text-align: center; cursor: pointer; transition: 0.4s; 
            border: 1px solid #2a2a2a; position: relative; overflow: hidden; 
        }
        .card:hover { transform: translateY(-8px); border-color: transparent; }
        .card::before { 
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; 
            background: conic-gradient(from 0deg, #ff0000, #00f2ff, #00ff00, #ffff00, #ff0000); 
            animation: rotateRGB 3s linear infinite; opacity: 0; transition: 0.3s; z-index: 0; 
        }
        .card:hover::before { opacity: 1; }
        .card::after { 
            content: ''; position: absolute; inset: 3px; background: var(--card-bg); 
            border-radius: 32px; z-index: 1; 
        }
        @keyframes rotateRGB { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .card-content { position: relative; z-index: 2; }
        .card img { width: 90px; height: 90px; border-radius: 22px; margin-bottom: 12px; object-fit: cover; }
        .dev-name { color: var(--accent); font-size: 0.75rem; font-weight: bold; margin-bottom: 5px; }
        .verified-badge { 
            position: absolute; top: 15px; right: 15px; background: var(--accent); 
            color: black; font-size: 0.6rem; padding: 4px 8px; border-radius: 10px; font-weight: 900; z-index: 5; 
        }

        .plat-tags { display: flex; justify-content: center; gap: 4px; flex-wrap: wrap; margin-bottom: 8px; }
        .plat-tag { 
            background: #333; color: var(--accent); font-size: 0.55rem; 
            padding: 2px 6px; border-radius: 5px; border: 1px solid rgba(0, 242, 255, 0.2); 
            font-weight: bold; text-transform: uppercase; 
        }

        /* MODAL VE BUTONLAR */
        .overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); 
            display: none; justify-content: center; align-items: center; z-index: 1000; 
        }
        .modal { 
            background: var(--card-bg); width: 95%; max-width: 420px; padding: 30px; 
            border-radius: 40px; text-align: center; border: 1px solid #333; position: relative; 
        }
        .modal img { width: 100px; height: 100px; border-radius: 25px; margin-bottom: 15px; }
        
        .link-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 20px; }
        .download-btn { 
            display: block; background: var(--accent); color: #000; 
            text-decoration: none; padding: 15px; border-radius: 15px; 
            font-weight: 800; font-size: 0.85rem; transition: 0.3s;
        }
        .download-btn:hover { transform: scale(1.02); filter: brightness(1.1); }
        .close-btn { position: absolute; top: 20px; right: 25px; font-size: 30px; cursor: pointer; color: #555; }
    </style>
</head>
<body>

    <header>
        <h1>Fix App</h1>
        <div class="controls">
            <input type="text" id="searchInput" placeholder="Uygulama ara..." onkeyup="filterAll()">
            <div class="filters">
                <button class="filter-btn active" onclick="setFilter('all', this)">Hepsi</button>
                <button class="filter-btn" onclick="setFilter('windows', this)">Win</button>
                <button class="filter-btn" onclick="setFilter('android', this)">Android</button>
                <button class="filter-btn" onclick="setFilter('ios', this)">iOS</button>
                <button class="filter-btn" onclick="setFilter('web', this)">Web</button>
                <button class="filter-btn" onclick="setFilter('lynx', this)">Lynx</button>
            </div>
        </div>
    </header>

    <div class="grid" id="appGrid"></div>

    <div class="overlay" id="overlay" onclick="closeApp()">
        <div class="modal" onclick="event.stopPropagation()">
            <span class="close-btn" onclick="closeApp()">&times;</span>
            <img id="m-img" src="">
            <h2 id="m-title" style="margin: 0;"></h2>
            <div id="m-dev" style="color: var(--accent); font-weight: bold; font-size: 0.8rem; margin-top: 5px;"></div>
            <p id="m-desc" style="color: var(--text-dim); line-height: 1.5; margin-top: 15px; font-size: 0.85rem;"></p>
            
            <div id="link-container" class="link-grid"></div>
        </div>
    </div>

    <script>
        let allApps = []; 
        let currentFilter = 'all';

        async function fetchApps() {
            allApps = []; 
            const t = Date.now();
            // Kendi repondan veriyi çekiyoruz
            await loadFile('https://raw.githubusercontent.com/fixing-by/fixapp/main/online.app.s?t=' + t, false);
            filterAll();
        }

        async function loadFile(url, isOri) {
            try {
                const res = await fetch(url, { cache: "no-store" });
                if (res.ok) {
                    const text = await res.text();
                    const lines = text.split(/\r?\n/).filter(l => l.trim() !== "");
                    lines.forEach(line => {
                        const p = line.split(',').map(i => i.trim());
                        if (p.length >= 5 && p[0].toLowerCase() !== 's') {
                            const links = p[5] ? p[5].split(' ') : ['#'];
                            allApps.push({
                                ad: p[0],
                                dev: p[1] || 'Fixing User',
                                desc: p[2] || '',
                                plat: p[3] ? p[3].toLowerCase().split(' ') : [],
                                logo: p[4] || '',
                                links: links,
                                isOriginal: isOri
                            });
                        }
                    });
                }
            } catch (e) { console.error("Veri hatası:", e); }
        }

        function setFilter(type, btn) {
            currentFilter = type;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            filterAll();
        }

        function filterAll() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const grid = document.getElementById('appGrid');
            grid.innerHTML = "";

            [...allApps].reverse().forEach(app => {
                const matchesSearch = app.ad.toLowerCase().includes(term) || app.dev.toLowerCase().includes(term);
                const matchesFilter = currentFilter === 'all' || app.plat.includes(currentFilter);

                if (matchesSearch && matchesFilter) {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.onclick = () => openApp(app);
                    const badge = app.isOriginal ? `<div class="verified-badge">ORİJİNAL</div>` : '';
                    const platHtml = app.plat.map(pt => `<span class="plat-tag">${pt}</span>`).join('');

                    card.innerHTML = `
                        ${badge}
                        <div class="card-content">
                            <img src="${app.logo}" onerror="this.src='https://via.placeholder.com/90/252525/00f2ff?text=FIX'">
                            <div class="dev-name">${app.dev.toUpperCase()}</div>
                            <h3 style="margin: 5px 0;">${app.ad}</h3>
                            <div class="plat-tags">${platHtml}</div>
                        </div>
                    `;
                    grid.appendChild(card);
                }
            });
        }

        function openApp(app) {
            document.getElementById('m-img').src = app.logo;
            document.getElementById('m-title').textContent = app.ad;
            document.getElementById('m-dev').textContent = "GELİŞTİRİCİ: " + app.dev.toUpperCase();
            document.getElementById('m-desc').textContent = app.desc;
            
            const container = document.getElementById('link-container');
            container.innerHTML = "";
            
            app.links.forEach((rawLink) => {
                const btn = document.createElement('a');
                btn.className = "download-btn";

                const match = rawLink.match(/\[(.*?)\](.*)/);
                let plat = "İNDİR";
                let cleanUrl = rawLink.trim();

                if (match) {
                    plat = match[1].toLowerCase();
                    cleanUrl = match[2].trim();
                }

                if (cleanUrl === "" || cleanUrl === "#") {
                    btn.href = "#";
                    btn.textContent = plat.toUpperCase() + " (YAKINDA)";
                    btn.style.background = "#444";
                } 
                else if (!cleanUrl.startsWith('http')) {
                    // SENİN REPO YOLUN: fixing-by/fixapp
                    const repoBase = "https://raw.githubusercontent.com/fixing-by/fixapp/main/";
                    btn.href = repoBase + cleanUrl;
                    btn.setAttribute('download', cleanUrl);
                    btn.textContent = plat.toUpperCase() + " DOSYASINI İNDİR";
                } 
                else {
                    btn.href = cleanUrl;
                    btn.target = "_blank";
                    btn.textContent = plat.toUpperCase() + " SÜRÜMÜNE GİT";
                }
                
                // Renk Şeması
                if(plat === 'android') btn.style.background = "#3DDC84";
                if(plat === 'windows') { btn.style.background = "#0078D4"; btn.style.color = "white"; }
                if(plat === 'ios') { btn.style.background = "#ffffff"; btn.style.color = "black"; }
                if(plat === 'lynx') btn.style.background = "linear-gradient(90deg, #00f2ff, #ff00ea)";

                container.appendChild(btn);
            });
            
            document.getElementById('overlay').style.display = 'flex';
        }

        function closeApp() { document.getElementById('overlay').style.display = 'none'; }

        fetchApps();
    </script>
</body>
</html>
